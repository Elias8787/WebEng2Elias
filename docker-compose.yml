services:
  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPOONACULAR_API_KEY=${SPOONACULAR_API_KEY}
      - OPENWEATHERMAP_API_KEY=${OPENWEATHERMAP_API_KEY}
    volumes:
      - h2data:/app/data

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://backend:8080
    depends_on:
      - backend

volumes:
  h2data:
