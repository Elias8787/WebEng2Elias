services:
  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPOONACULAR_API_KEY=${SPOONACULAR_API_KEY}
      - OPENWEATHERMAP_API_KEY=${OPENWEATHERMAP_API_KEY}
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      - POSTGRES_DB=macros
      - POSTGRES_USER=macros
      - POSTGRES_PASSWORD=macros
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://backend:8080
    depends_on:
      - backend

volumes:
  pgdata:
